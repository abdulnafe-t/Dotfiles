# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

layerrule = blur on, match:namespace waybar

windowrule {
 name = keepass-unlock-float
 match:title = Unlock Database - KeePassXC
 float = yes
}

windowrule {
 name = keepass-generator-float
 match:title = Generate Password
 float = yes
}

windowrule {
 name = keepass-permission-float
 match:title = KeePassXC -  Access Request
 float = yes
}

windowrule {
 name = steam-friends-list-float
 match:title = Friends List
 float = yes
}