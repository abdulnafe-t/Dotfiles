icon-theme=BeautyLineRecolored
width=40
font=Geist
use-bold=yes
line-height=15
fields=name,generic,comment,categories,filename,keywords
terminal=foot
prompt="❯   "
show-actions=no
exit-on-keyboard-focus-loss=no
list-executables-in-path=no
match-mode=fuzzy

[colors]
background=0d0d0dff
selection=2e3161fa
selection-text=bbbbbbff
text=cdcdcdff
match=b6a0ffff
selection-match=b6a0ffff
border=ffffffff

[border]
radius=20
selection-radius=20

[dmenu]
exit-immediately-if-empty=yes
