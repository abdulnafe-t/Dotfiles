<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <!-- Thai sans -->
  <match>
    <test name="lang" compare="contains"><string>th</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="assign">
      <string>Waree</string>
      <string>Garuda</string>
      <string>Loma</string>
      <string>Umpush</string>
      <string>IBM Plex Sans Thai</string>
      <string>IBM Plex Sans Thai Looped</string>
    </edit>
  </match>

  <!-- Thai serif -->
  <match>
    <test name="lang" compare="contains"><string>th</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="assign">
      <string>Norasi</string>
      <string>Kinnari</string>
    </edit>
  </match>

  <!-- Thai mono (optional) -->
  <match>
    <test name="lang" compare="contains"><string>th</string></test>
    <test name="family"><string>monospace</string></test>
    <edit name="family" mode="assign">
      <string>TlwgTypewriter</string>
      <string>TlwgTypo</string>
    </edit>
  </match>

</fontconfig>
