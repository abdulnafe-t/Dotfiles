<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <alias>
    <family>Helvetica</family>
    <prefer>
      <family>Nimbus Sans</family>
    </prefer>
  </alias>

  <alias>
    <family>Helvetica Condensed</family>
    <prefer>
      <family>Nimbus Sans Narrow</family>
    </prefer>
  </alias>
    
</fontconfig>
