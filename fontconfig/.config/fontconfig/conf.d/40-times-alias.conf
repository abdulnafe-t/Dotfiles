<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <alias>
    <family>Times</family>
    <prefer>
      <family>Nimbus Roman</family>
    </prefer>
  </alias>
    
  <alias>
    <family>Times New Roman</family>
    <prefer>
      <family>Liberation Serif</family>
    </prefer>
  </alias>
  
</fontconfig>
