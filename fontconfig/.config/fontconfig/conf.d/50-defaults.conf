<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <alias>
    <family>serif</family>
    <prefer>
      <family>Merriweather</family>
    </prefer>
  </alias>

  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Geist</family>
    </prefer>
  </alias>

  <alias>
    <family>monospace</family>
    <prefer>
      <family>Geist Mono</family>
      <family>Iosevkaterm Nerd Font Propo</family>
    </prefer>
  </alias>

</fontconfig>
