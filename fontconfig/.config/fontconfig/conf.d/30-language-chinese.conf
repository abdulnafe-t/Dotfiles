<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- Chinese sans -->
  <match>
    <test name="lang" compare="contains"><string>zh</string></test>
    <test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="assign">
      <string>LXGW Neo XiHei</string>
    </edit>
  </match>

  <!-- Simplified -->
  <match>
    <test name="lang" compare="eq"><string>zh</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="assign">
      <string>AR PL UMing CN</string>
    </edit>
  </match>

  <!-- Taiwan -->
  <match>
    <test name="lang" compare="eq"><string>zh-tw</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="assign">
      <string>AR PL UMing TW</string>
    </edit>
  </match>
  
  <match>
    <test name="lang" compare="eq"><string>zh-Hant-TW</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="assign">
      <string>AR PL UMing TW</string>
    </edit>
  </match>
  
  <!-- Hong Kong / Cantonese -->
  <match>
    <test name="lang" compare="eq"><string>zh-hk</string></test>
    <test name="family"><string>serif</string></test>
    <edit name="family" mode="assign">
      <string>AR PL UMing HK</string>
    </edit>
  </match>
</fontconfig>