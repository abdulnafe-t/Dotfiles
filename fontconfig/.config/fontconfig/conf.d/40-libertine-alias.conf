<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <alias>
    <family>Linux Libertine</family>
    <prefer>
      <family>Libertinus Serif</family>
    </prefer>
  </alias>

  <alias>
    <family>Linux Biolinum</family>
    <prefer>
      <family>Libertinus Sans</family>
    </prefer>
  </alias>
	
</fontconfig>
